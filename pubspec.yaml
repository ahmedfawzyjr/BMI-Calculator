name: bmi_calculator
description: A new Flutter project.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^10.7.0
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  google_fonts: ^6.2.1
  intl: ^0.20.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Premium Animations
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  shimmer: ^3.0.0
  animated_text_kit: ^4.2.2
  confetti: ^0.7.0
  fl_chart: ^0.68.0
  
  # Sound Effects
  audioplayers: ^6.0.0
  
  # Premium UI
  glassmorphism: ^3.0.0
  particles_flutter: ^0.1.4

  # New Enhancements
  shared_preferences: ^2.3.2
  share_plus: ^10.0.0
  screenshot: ^3.0.0
  path_provider: ^2.1.4
  csv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  hive_generator: ^2.0.1
  hive_test: ^1.0.0
  flutter_launcher_icons: ^0.13.1
  golden_toolkit: ^0.15.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/app_icon.png"
  min_sdk_android: 21 # android min sdk min:16, default 21

flutter:
  uses-material-design: true
  generate: true
